services:
  - type: web
    name: anath-shiksha-foundation
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: UPI_ID
        value: anathshikshafoundation@ybl
      - key: WHATSAPP_NUMBER
        value: "917752923441"
