services:
  - type: web
    name: anath-shiksha-foundation
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && node setup-data.js
    startCommand: node server.js
    disk:
      name: data-store
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: UPI_ID
        value: anathshikshafoundation@ybl
      - key: WHATSAPP_NUMBER
        value: "917752923441"
